name: CI/CD IPAM Pipeline

on:
  push:
    branches: [ "main" ] # Si attiva ogni volta che fai push su main
  workflow_dispatch:      # Ti permette di avviarlo anche a mano per test

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice dal tuo repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installa Java (Usa la versione che hai nel pom.xml, es. 21 o 25)
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25' 
          distribution: 'temurin'
          cache: maven

      # 3. Compila il .jar con Maven (senza far girare i test per far prima)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Prepara il supporto per le diverse architetture (x86 e ARM)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Entra nel tuo Docker Hub (usa i Secrets che hai impostato)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Costruisce l'immagine (usando il tuo Dockerfile con Alpine) e la spinge online
      - name: Build and push Multi-Arch Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Sostituisci 'ipam-backend' con il nome del tuo repository su Docker Hub
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ipam-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ipam-backend:${{ github.run_number }}
