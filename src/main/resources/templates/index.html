<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table-responsive { max-height: 600px; overflow-y: auto; }
        .sticky-thead th { position: sticky; top: 0; background-color: #f8f9fa; z-index: 1; }
        .badge-libero { background-color: #0dcaf0; color: #000; }
        .badge-assegnato { background-color: #ffc107; color: #000; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🛰️ IPAM Professional System</span>
    </div>
</nav>

<div class="container">

    <div th:if="${successo}" class="alert alert-success alert-dismissible fade show" role="alert">
        <strong th:text="${successo}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errore}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong th:text="${errore}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row">
        <div class="col-lg-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white fw-bold">Nuova Sottorete</div>
                <div class="card-body">
                    <form th:action="@{/rete/genera}" method="post">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">CIDR</label>
                            <input type="text" name="cidr" class="form-control" placeholder="10.0.0.0/24" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Descrizione</label>
                            <input type="text" name="descrizione" class="form-control" placeholder="Server Farm">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Genera IP</button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-header bg-dark text-white fw-bold">Reti nel Database</div>
                <div class="list-group list-group-flush">
                    <div th:each="r : ${reti}" class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fw-bold" th:text="${r.cidr}"></div>
                            <small class="text-muted" th:text="${r.descrizione}"></small>
                        </div>
                        <form th:action="@{/rete/elimina}" method="post" onsubmit="return confirm('ATTENZIONE: Eliminando la rete cancellerai tutti gli IP associati. Procedere?');">
                            <input type="hidden" name="cidr" th:value="${r.cidr}">
                            <button type="submit" class="btn btn-sm btn-outline-danger border-0">🗑️</button>
                        </form>
                    </div>
                    <div th:if="${#lists.isEmpty(reti)}" class="p-3 text-center text-muted italic">Nessuna rete configurata</div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow-sm mb-4 border-success">
                <div class="card-header bg-success text-white fw-bold">Assegna Indirizzo IP</div>
                <div class="card-body">
                    <form th:action="@{/ip/assegna}" method="post" class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">IP</label>
                            <input type="text" name="ip" class="form-control form-control-sm" placeholder="10.0.0.5" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">MAC Address</label>
                            <input type="text" name="mac" class="form-control form-control-sm" placeholder="00:1A:..." required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Nome Host</label>
                            <input type="text" name="nome" class="form-control form-control-sm" placeholder="WebServer-01" required>
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn btn-success btn-sm px-4">Registra</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-bold">Database Indirizzi IP</span>
                    <span class="badge bg-secondary" th:text="${indirizzi != null ? indirizzi.size() : 0} + ' Record'"></span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="sticky-thead">
                        <tr>
                            <th>Indirizzo IP</th>
                            <th>Stato</th>
                            <th>Dispositivo</th>
                            <th>MAC</th>
                            <th>Azione</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="ip : ${indirizzi}">
                            <td class="font-monospace fw-bold" th:text="${ip.ip}"></td>
                            <td>
                                    <span th:class="${ip.stato == 'LIBERO' ? 'badge badge-libero' : 'badge badge-assegnato'}"
                                          th:text="${ip.stato}"></span>
                            </td>
                            <td th:text="${ip.nome ?: '-'}"></td>
                            <td class="small text-muted" th:text="${ip.macAddress ?: '-'}"></td>
                            <td>
                                <form th:if="${ip.stato == 'ASSEGNATO'}" th:action="@{/ip/libera}" method="post">
                                    <input type="hidden" name="ip" th:value="${ip.ip}">
                                    <button type="submit" class="btn btn-link btn-sm text-danger p-0">Libera IP</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
